services:
  - type: web
    name: doubt-resolution-backend
    env: docker
    plan: free
    # The build context should be the backend folder
    rootDir: ./backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_URL
        fromDatabase:
          name: doubt-resolution-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: doubt-resolution-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: doubt-resolution-db
          property: password
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: DB_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: doubt-resolution-db
    plan: free
    databaseName: doubtresolution
    user: doubtuser
