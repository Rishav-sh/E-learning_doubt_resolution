spring.application.name=doubt-resolution-backend

# Database Configuration (Environment variable overrides)
spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server Port
server.port=8080

# Custom JWT Properties
doubtresolution.app.jwtSecret=${JWT_SECRET:SuperSecretKeyForDoubtResolutionPlatform12345!!}
doubtresolution.app.jwtExpirationMs=86400000
